openapi: 3.0.3
info:
  title: Mobile Money Bridge API
  description: API for bridging mobile money providers with the Stellar network.
  version: 1.0.0
servers:
  - url: http://localhost:3000/api
    description: Local development server
paths:
  /v1/transactions/deposit:
    post:
      summary: Deposit funds from mobile money
      operationId: deposit
      tags:
        - Transactions
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionRequest'
      responses:
        '200':
          description: Transaction initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '400':
          description: Invalid input or limit exceeded
  /v1/transactions/withdraw:
    post:
      summary: Withdraw funds to mobile money
      operationId: withdraw
      tags:
        - Transactions
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionRequest'
      responses:
        '200':
          description: Transaction initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
  /v1/transactions/{id}:
    get:
      summary: Get transaction status
      operationId: getTransaction
      tags:
        - Transactions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transaction details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionDetail'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    TransactionRequest:
      type: object
      required:
        - amount
        - phoneNumber
        - provider
        - stellarAddress
        - userId
      properties:
        amount:
          type: number
        phoneNumber:
          type: string
        provider:
          type: string
          enum: [mtn, airtel, orange]
        stellarAddress:
          type: string
        userId:
          type: string
        notes:
          type: string
    TransactionResponse:
      type: object
      properties:
        transactionId:
          type: string
        referenceNumber:
          type: string
        status:
          type: string
        jobId:
          type: string
    TransactionDetail:
      type: object
      properties:
        id:
          type: string
        amount:
          type: string
        phoneNumber:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
