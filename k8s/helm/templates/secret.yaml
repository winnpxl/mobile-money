{{- if .Values.secrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mobile-money.fullname" . }}-secrets
  labels:
    {{ include "mobile-money.labels" . | indent 4 }}
stringData:
  DATABASE_URL: "{{ .Values.secrets.databaseUrl }}"
  REDIS_URL: "{{ .Values.secrets.redisUrl }}"
  SESSION_SECRET: "{{ .Values.secrets.sessionSecret }}"
  STELLAR_ISSUER_SECRET: "{{ .Values.secrets.stellarIssuerSecret }}"
  MTN_API_KEY: "{{ .Values.secrets.mtnApiKey }}"
  MTN_API_SECRET: "{{ .Values.secrets.mtnApiSecret }}"
  MTN_SUBSCRIPTION_KEY: "{{ .Values.secrets.mtnSubscriptionKey }}"
  AIRTEL_API_KEY: "{{ .Values.secrets.airtelApiKey }}"
  AIRTEL_API_SECRET: "{{ .Values.secrets.airtelApiSecret }}"
  ORANGE_API_KEY: "{{ .Values.secrets.orangeApiKey }}"
  ORANGE_API_SECRET: "{{ .Values.secrets.orangeApiSecret }}"
  ADMIN_API_KEY: "{{ .Values.secrets.adminApiKey }}"
  OAUTH_CLIENT_ID: "{{ .Values.secrets.oauthClientId }}"
  OAUTH_CLIENT_SECRET: "{{ .Values.secrets.oauthClientSecret }}"
  OAUTH_REDIRECT_URI: "{{ .Values.secrets.oauthRedirectUri }}"
  OAUTH_JWT_SECRET: "{{ .Values.secrets.oauthJwtSecret }}"
{{- end }}
