{{- if .Values.app.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mobile-money.fullname" . }}
  labels:
    {{ include "mobile-money.labels" . | indent 4 }}
spec:
  replicas: {{ .Values.app.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "mobile-money.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "mobile-money.name" . }}
      annotations:
        {{- if .Values.config.prometheusScrape }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
        {{- end }}
        {{- if .Values.podAnnotations }}
{{ toYaml .Values.podAnnotations | indent 8 }}
        {{- end }}
    spec:
      {{- if .Values.app.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.app.nodeSelector | indent 8 }}
      {{- end }}
      {{- if .Values.app.tolerations }}
      tolerations:
{{ toYaml .Values.app.tolerations | indent 8 }}
      {{- end }}
      {{- if .Values.app.affinity }}
      affinity:
{{ toYaml .Values.app.affinity | indent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | indent 8 }}
      {{- end }}
      containers:
        - name: mobile-money
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.app.service.targetPort }}
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: {{ include "mobile-money.fullname" . }}-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "mobile-money.fullname" . }}-config
                  key: PORT
            - name: STELLAR_NETWORK
              valueFrom:
                configMapKeyRef:
                  name: {{ include "mobile-money.fullname" . }}-config
                  key: STELLAR_NETWORK
            - name: COMPRESSION_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: {{ include "mobile-money.fullname" . }}-config
                  key: COMPRESSION_ENABLED
            - name: RATE_LIMIT_WINDOW_MS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "mobile-money.fullname" . }}-config
                  key: RATE_LIMIT_WINDOW_MS
            - name: RATE_LIMIT_MAX_REQUESTS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "mobile-money.fullname" . }}-config
                  key: RATE_LIMIT_MAX_REQUESTS
            - name: REQUEST_SIZE_LIMIT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "mobile-money.fullname" . }}-config
                  key: REQUEST_SIZE_LIMIT
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "mobile-money.fullname" . }}-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "mobile-money.fullname" . }}-secrets
                  key: REDIS_URL
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "mobile-money.fullname" . }}-secrets
                  key: SESSION_SECRET
            - name: STELLAR_ISSUER_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "mobile-money.fullname" . }}-secrets
                  key: STELLAR_ISSUER_SECRET
            - name: MTN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "mobile-money.fullname" . }}-secrets
                  key: MTN_API_KEY
            - name: MTN_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "mobile-money.fullname" . }}-secrets
                  key: MTN_API_SECRET
            - name: MTN_SUBSCRIPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "mobile-money.fullname" . }}-secrets
                  key: MTN_SUBSCRIPTION_KEY
            - name: AIRTEL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "mobile-money.fullname" . }}-secrets
                  key: AIRTEL_API_KEY
            - name: AIRTEL_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "mobile-money.fullname" . }}-secrets
                  key: AIRTEL_API_SECRET
            - name: ORANGE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "mobile-money.fullname" . }}-secrets
                  key: ORANGE_API_KEY
            - name: ORANGE_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "mobile-money.fullname" . }}-secrets
                  key: ORANGE_API_SECRET
            - name: ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "mobile-money.fullname" . }}-secrets
                  key: ADMIN_API_KEY
            - name: OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "mobile-money.fullname" . }}-secrets
                  key: OAUTH_CLIENT_ID
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "mobile-money.fullname" . }}-secrets
                  key: OAUTH_CLIENT_SECRET
            - name: OAUTH_REDIRECT_URI
              valueFrom:
                secretKeyRef:
                  name: {{ include "mobile-money.fullname" . }}-secrets
                  key: OAUTH_REDIRECT_URI
            - name: OAUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "mobile-money.fullname" . }}-secrets
                  key: OAUTH_JWT_SECRET
          resources:
{{ toYaml .Values.app.resources | indent 12 }}
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.app.service.targetPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.app.service.targetPort }}
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
{{- end }}
