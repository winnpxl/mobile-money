{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mobile-money.fullname" . }}-redis
  labels:
    {{ include "mobile-money.labels" . | indent 4 }}
spec:
  type: {{ .Values.redis.service.type }}
  selector:
    app: {{ include "mobile-money.name" . }}-redis
  ports:
    - protocol: TCP
      port: {{ .Values.redis.service.port }}
      targetPort: {{ .Values.redis.service.port }}
{{- end }}
