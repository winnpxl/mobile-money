version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Africa/Lagos"
    target-branch: "main"
    open-pull-requests-limit: 10
    reviewers:
      - "RemmyAcee"
    assignees:
      - "RemmyAcee"
    labels:
      - "dependencies"
      - "npm"
      - "security" # Added to help route security patches
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      npm-production:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      npm-development:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      # NEW: Group security updates to reduce noise (Issue #558)
      npm-security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directory: "/contracts"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:15"
      timezone: "Africa/Lagos"
    target-branch: "main"
    open-pull-requests-limit: 5
    reviewers:
      - "RemmyAcee"
    assignees:
      - "RemmyAcee"
    labels:
      - "dependencies"
      - "rust"
      - "security"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      cargo-dependencies:
        update-types:
          - "minor"
          - "patch"
      # NEW: Group security updates for Rust
      cargo-security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Africa/Lagos"
    target-branch: "main"
    open-pull-requests-limit: 5
    reviewers:
      - "RemmyAcee"
    assignees:
      - "RemmyAcee"
    labels:
      - "dependencies"
      - "github-actions"
      - "security"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"
      # NEW: Group security updates for Actions
      actions-security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"